{{- if .Values.gateway.enabled -}}
{{- range $index, $route := .Values.gateway.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "matching-platform.fullname" $ }}-route-{{ $index }}
  namespace: {{ $.Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "matching-platform.fullname" $ }}-gateway
  {{- if $route.hostname }}
  hostnames:
    - {{ $route.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $route.path | default "/" }}
      backendRefs:
        - name: {{ if eq $route.serviceName "leaderboard" }}{{ include "matching-platform.fullname" $ }}-leaderboard{{ else }}{{ $route.serviceName }}{{ end }}
          port: {{ $route.servicePort }}
{{- end }}
{{- end }}
